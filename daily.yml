name: Daily Email

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run script
        env:
          DAILY_FEED_EMAIL: ${{ secrets.EMAIL_USER }}
          DAILY_FEED_PASSWORD: ${{ secrets.EMAIL_PASS }}
          DAILY_FEED_RECIPIENT: ${{ secrets.EMAIL_USER }}
        run: python main.py

      - name: Commit updated used_items.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add used_items.json
          git diff --staged --quiet || git commit -m "chore: update used items for daily feed"
          git push
