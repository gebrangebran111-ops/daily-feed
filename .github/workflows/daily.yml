name: Daily Email

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run script
        env:
          DAILY_FEED_EMAIL: ${{ secrets.EMAIL_USER }}
          DAILY_FEED_PASSWORD: ${{ secrets.EMAIL_PASS }}
          DAILY_FEED_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
          DAILY_FEED_FORCE_SEND: "true"
        run: python main.py

      - name: Keep repo active
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "Last run: $(date -u)" > .last_run
          git add .last_run
          git commit -m "chore: keep alive $(date -u +'%Y-%m-%d')"
          git push
